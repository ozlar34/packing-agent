<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f1c33"/>
      <stop offset="1" stop-color="#1b2c4a"/>
    </linearGradient>
    <linearGradient id="agent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="warmcold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f97316"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#cbd5e1"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- title block -->
  <text x="80" y="92" fill="#ffffff" font-size="54" font-weight="700">Personalized Trip Packing-List Agent</text>
  <text x="80" y="138" fill="#9fc6ff" font-size="27" font-weight="500">An ADK agent that knows the trip — and knows <tspan font-style="italic">you</tspan>. Every medication survives into every list.</text>
  <rect x="82" y="156" width="640" height="4" rx="2" fill="url(#warmcold)"/>

  <!-- top row: Web UI + Profile -->
  <g filter="url(#shadow)">
    <rect x="180" y="210" width="430" height="118" rx="14" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  </g>
  <text x="395" y="252" text-anchor="middle" fill="#ffffff" font-size="25" font-weight="700">Web UI</text>
  <text x="395" y="284" text-anchor="middle" fill="#cbd5e1" font-size="18">questionnaire + checklist</text>
  <text x="395" y="309" text-anchor="middle" fill="#94a3b8" font-size="15">destination · dates · purpose</text>

  <g filter="url(#shadow)">
    <rect x="990" y="210" width="430" height="118" rx="14" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  </g>
  <text x="1205" y="252" text-anchor="middle" fill="#ffffff" font-size="25" font-weight="700">User Profile  (profile.json)</text>
  <text x="1205" y="284" text-anchor="middle" fill="#cbd5e1" font-size="18">medications · essentials · prefs</text>
  <text x="1205" y="309" text-anchor="middle" fill="#fca5a5" font-size="15">local-only · gitignored · never logged</text>

  <!-- arrows into agent -->
  <path d="M395 328 L395 392" stroke="#cbd5e1" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
  <text x="410" y="368" fill="#94a3b8" font-size="14">trip input (JSON)</text>
  <path d="M1205 328 L1205 392" stroke="#cbd5e1" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
  <text x="1220" y="368" fill="#94a3b8" font-size="14">read at runtime</text>

  <!-- core agent -->
  <g filter="url(#shadow)">
    <rect x="180" y="396" width="1240" height="138" rx="16" fill="url(#agent)"/>
  </g>
  <text x="800" y="442" text-anchor="middle" fill="#ffffff" font-size="29" font-weight="700">Core Agent (ADK) — the only place reasoning happens</text>
  <text x="800" y="478" text-anchor="middle" fill="#e0e7ff" font-size="19">reads inputs → calls weather tool → selects ONE skill → deterministic merge (profile &gt; weather &gt; skill)</text>
  <text x="800" y="512" text-anchor="middle" fill="#c7d2fe" font-size="16" font-style="italic">CONCEPT 1 · Gemini 2.5 Flash · app/agent.py</text>

  <!-- arrows down to tools -->
  <path d="M520 534 L520 600" stroke="#cbd5e1" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
  <text x="535" y="575" fill="#94a3b8" font-size="14">calls (MCP)</text>
  <path d="M1080 534 L1080 600" stroke="#cbd5e1" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
  <text x="1095" y="575" fill="#94a3b8" font-size="14">loads on demand</text>

  <!-- weather MCP -->
  <g filter="url(#shadow)">
    <rect x="180" y="604" width="560" height="126" rx="14" fill="#13334a" stroke="#38bdf8" stroke-width="1.5"/>
  </g>
  <text x="460" y="646" text-anchor="middle" fill="#ffffff" font-size="24" font-weight="700">Weather MCP Server</text>
  <text x="460" y="678" text-anchor="middle" fill="#cbd5e1" font-size="18">get_weather(dest, dates) · keyless Open-Meteo</text>
  <text x="460" y="710" text-anchor="middle" fill="#7dd3fc" font-size="15" font-style="italic">CONCEPT 2 · stdio · app/weather_server.py</text>

  <!-- skills -->
  <g filter="url(#shadow)">
    <rect x="860" y="604" width="560" height="126" rx="14" fill="#3b2a4a" stroke="#a78bfa" stroke-width="1.5"/>
  </g>
  <text x="1140" y="646" text-anchor="middle" fill="#ffffff" font-size="24" font-weight="700">Trip Skills (Agents CLI)</text>
  <text x="1140" y="678" text-anchor="middle" fill="#cbd5e1" font-size="18">beach · cold_weather (progressive disclosure)</text>
  <text x="1140" y="710" text-anchor="middle" fill="#c4b5fd" font-size="15" font-style="italic">CONCEPT 3 · skills/&lt;name&gt;/SKILL.md</text>

  <!-- arrows to output -->
  <path d="M460 730 L730 786" stroke="#cbd5e1" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M1140 730 L870 786" stroke="#cbd5e1" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>

  <!-- output -->
  <g filter="url(#shadow)">
    <rect x="540" y="790" width="520" height="76" rx="14" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  </g>
  <text x="800" y="824" text-anchor="middle" fill="#ffffff" font-size="23" font-weight="700">Rendered Packing List</text>
  <text x="800" y="850" text-anchor="middle" fill="#bbf7d0" font-size="16">personalized · checkable · each item tagged by source</text>

  <!-- security badge -->
  <g filter="url(#shadow)">
    <rect x="1180" y="150" width="340" height="40" rx="20" fill="#7f1d1d" stroke="#fca5a5" stroke-width="1"/>
  </g>
  <text x="1350" y="176" text-anchor="middle" fill="#fee2e2" font-size="16" font-weight="600">🔒 CONCEPT 4 · data minimization · no secrets in repo</text>
</svg>
